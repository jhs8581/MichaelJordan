# ============================================================
# Lightsail Nginx 설정 파일
# 위치: /etc/nginx/sites-available/chat
# 심볼릭 링크: ln -s /etc/nginx/sites-available/chat /etc/nginx/sites-enabled/
# IP: 15.164.117.143
#
# SSL 최초 발급 명령 (서버에서 실행):
#   sudo apt install certbot python3-certbot-nginx -y
#   sudo certbot --nginx -d 15.164.117.143.nip.io
# ============================================================

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name 15.164.117.143.nip.io;
    return 301 https://$host$request_uri;
}

# HTTPS + WebSocket
server {
    listen 443 ssl;
    server_name 15.164.117.143.nip.io;

    ssl_certificate     /etc/letsencrypt/live/15.164.117.143.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/15.164.117.143.nip.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # API + WebSocket 프록시 → Fastify (포트 3001)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket 업그레이드 핵심 설정
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;  # WebSocket 장시간 연결 유지
    }
}
