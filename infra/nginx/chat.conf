# ============================================================
# Lightsail Nginx 설정 파일
# 위치: /etc/nginx/sites-available/chat
# 심볼릭 링크: ln -s /etc/nginx/sites-available/chat /etc/nginx/sites-enabled/
# IP: 15.164.117.143 (도메인 연결 시 server_name을 도메인으로 변경 후 certbot 발급)
# ============================================================

# HTTP (IP 직접 접속)
server {
    listen 80;
    server_name 15.164.117.143;

    # API + WebSocket 프록시 → Fastify (포트 3001)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket 업그레이드 핵심 설정
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;  # WebSocket 장시간 연결 유지
    }
}

# ============================================================
# 도메인 연결 후 HTTPS 추가 시 아래 블록 사용
# (certbot --nginx -d your-domain.com 실행 후 자동 생성됨)
# ============================================================
