<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- 배경 -->
  <rect width="192" height="192" rx="28" fill="#FF6B35"/>
  
  <!-- 쇼핑백 -->
  <g transform="translate(96, 96)">
    <!-- 가방 본체 -->
    <rect x="-35" y="-10" width="70" height="60" rx="4" fill="#FFFFFF" stroke="#333" stroke-width="3"/>
    
    <!-- 손잡이 왼쪽 -->
    <path d="M -20 -10 Q -20 -30, -10 -30" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    
    <!-- 손잡이 오른쪽 -->
    <path d="M 20 -10 Q 20 -30, 10 -30" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    
    <!-- 할인 태그 -->
    <circle cx="20" cy="5" r="15" fill="#FF1744"/>
    <text x="20" y="10" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFFFFF">%</text>
  </g>
</svg>
